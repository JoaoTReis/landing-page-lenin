backend:
  name: github
  repo: JoaoTReis/landing-page-lenin
  base_url: https://lfadvocacia.net/
  auth_endpoint: /api/auth/ # Essa rota vai ser muito importante mais para frente

collections:
  - name: posts
    label: Artigos
    folder: posts
    create: true
    slug: '{{slug}}'
    fields:
      - { label: 'Link do Artigo', name: 'link', widget: 'string' }
      - {
          label: 'Data de Publicação',
          name: 'date',
          widget: 'datetime',
          format: 'YYYY-MM-DD hh:mm:ss'
        }
      - {
          label: 'Categoria',
          name: 'categoria',
          widget: 'select',
          options: ['direito civil', 'direito penal', 'direito trabalhista'] # edite conforme necessário
        }
