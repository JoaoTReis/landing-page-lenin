backend:
  name: github
  repo: JoaoTReis/landing-page-lenin
  branch: main # ajuste se a branch principal for diferente

media_folder: public/assets/img
public_folder: /assets/img

publish_mode: editorial_workflow

collections:
  - name: posts
    label: Artigos
    folder: posts
    create: true
    slug: '{{slug}}'
    fields:
      - { label: 'Link do Artigo', name: 'link', widget: 'string' }
      - {
          label: 'Data de Publicação',
          name: 'date',
          widget: 'datetime',
          format: 'YYYY-MM-DD hh:mm:ss'
        }
      - {
          label: 'Categoria',
          name: 'categoria',
          widget: 'select',
          options: ['direito civil', 'direito penal', 'direito trabalhista']
        }
